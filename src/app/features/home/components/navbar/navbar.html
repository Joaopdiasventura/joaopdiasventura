<nav class="navbar" aria-label="Primary">
  <div class="container-wide navbar__inner">
    <a
      class="navbar__brand"
      [attr.href]="homeHref()"
      [attr.aria-label]="copy(chrome.brandLabel)"
      (click)="closeMenu()"
    >
      <img ngSrc="/assets/icon.svg" width="42" height="42" priority alt="" aria-hidden="true" />

      <span class="navbar__brand-copy">
        <strong>João Paulo</strong>
        <span>{{ copy(brandStrapline) }}</span>
      </span>
    </a>

    <div class="navbar__links" aria-label="Section navigation">
      @for (item of navItems; track item.id) {
        <a class="navbar__link action-link" [attr.href]="sectionHref(item.id)" (click)="closeMenu()">
          {{ copy(item.label) }}
        </a>
      }
    </div>

    <div class="navbar__actions">
      <button
        type="button"
        class="navbar__language"
        [attr.aria-label]="copy(chrome.switchLanguage)"
        (click)="toggleLanguageRoute()"
      >
        <span>{{ languageLabel() }}</span>
      </button>

      <button
        type="button"
        class="navbar__menu-toggle"
        [attr.aria-label]="isMenuOpen() ? copy(chrome.closeMenu) : copy(chrome.openMenu)"
        aria-controls="mobile-menu"
        [attr.aria-expanded]="isMenuOpen()"
        (click)="toggleMenu()"
      >
        <span></span>
        <span></span>
      </button>
    </div>
  </div>

  <div
    id="mobile-menu"
    class="mobile-menu"
    [class.mobile-menu--open]="isMenuOpen()"
    [attr.aria-hidden]="!isMenuOpen()"
  >
    <div class="container-wide mobile-menu__content">
      @for (item of navItems; track item.id) {
        <a class="mobile-menu__link action-link" [attr.href]="sectionHref(item.id)" (click)="closeMenu()">
          {{ copy(item.label) }}
        </a>
      }
    </div>
  </div>
</nav>
