<section #sectionRoot class="projects section-padding" aria-labelledby="projects-title">
  <div class="container-wide projects__intro-shell">
    <div class="projects__intro">
      <app-content-section-heading
        class="projects__heading"
        [eyebrow]="copy(content.heading.eyebrow)"
        [summary]="copy(content.heading.summary)"
        [summaryDelayMs]="100"
        [title]="copy(content.heading.title)"
        [titleId]="'projects-title'"
      />
    </div>

    <div appRevealOnScroll [delayMs]="140" [preset]="'panel'" class="projects__rail-meta">
      <p id="projects-track-hint" class="projects__hint">
        <span class="projects__hint-desktop">{{ copy(labels.desktopHint) }}</span>
        <span class="projects__hint-mobile">{{ copy(labels.mobileHint) }}</span>
      </p>

      <div class="projects__progress" aria-hidden="true">
        <span></span>
      </div>
    </div>
  </div>

  <div
    class="projects__scroll-region"
    appScrollMotion
    [scrollMotionViewport]="viewport"
    [scrollMotionTrack]="track"
    [scrollMotionSticky]="sticky"
    [scrollMotionMinWidth]="scrollMinWidth"
    [scrollMotionTopOffset]="scrollTopOffset"
  >
    <div #sticky class="projects__sticky">
      <div class="projects__viewport-shell">
        <div
          #viewport
          class="projects__viewport"
          role="region"
          aria-labelledby="projects-title"
          aria-describedby="projects-track-hint"
        >
          <ul #track class="projects__track">
            @for (project of projectCards(); track project.theme) {
              <li class="project-card-wrap">
                <app-project-card
                  appViewportTilt="project"
                  class="project-card"
                  [class.project-card--case]="project.caseRoute !== null"
                  [attr.aria-labelledby]="project.titleId"
                  [attr.data-theme]="project.theme"
                  [project]="project"
                />
              </li>
            }
          </ul>
        </div>
      </div>
    </div>
  </div>
</section>
