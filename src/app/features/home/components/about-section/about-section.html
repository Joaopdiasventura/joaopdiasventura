<section class="credibility section-padding" aria-labelledby="about-title">
  <div class="container-wide credibility__layout">
    <app-content-section-heading
      class="credibility__heading"
      [eyebrow]="copy(content.heading.eyebrow)"
      [summary]="copy(content.heading.summary)"
      [summaryDelayMs]="120"
      [title]="copy(content.heading.title)"
      [titleId]="'about-title'"
    />

    <div class="credibility__top">
      <div appRevealOnScroll [delayMs]="140" [preset]="'panel'" class="tilt-reveal-wrap">
        <app-profile-statement-card
          appViewportTilt="card"
          class="credibility__statement surface-card"
          [text]="copy(content.statement)"
        />
      </div>

      <div appRevealOnScroll [delayMs]="180" [preset]="'panel'" class="tilt-reveal-wrap">
        <app-profile-meta-card
          appViewportTilt="card"
          class="credibility__facts surface-card"
          [items]="factItems()"
        />
      </div>
    </div>

    <div class="credibility__grid">
      @for (group of content.groups; track copy(group.title); let index = $index) {
        <div
          appRevealOnScroll
          [delayMs]="index * 80 + 220"
          [preset]="'panel'"
          class="tilt-reveal-wrap"
        >
          <app-profile-group-card
            appViewportTilt="card"
            class="credibility__card surface-card"
            [items]="copyList(group.items)"
            [title]="copy(group.title)"
          />
        </div>
      }
    </div>
  </div>
</section>
