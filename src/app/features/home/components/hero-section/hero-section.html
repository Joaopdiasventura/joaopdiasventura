<section class="hero" aria-labelledby="hero-title">
  <div class="container-wide hero__container">
    <div class="hero__content">
      <span class="hero__eyebrow">{{ copy(content.eyebrow) }}</span>

      <h1 id="hero-title" class="hero__title">
        @for (line of titleLines(); track line) {
          <span class="hero__title-mask">
            <span class="hero__title-line">{{ line }}</span>
          </span>
        }
      </h1>

      <p class="hero__summary">
        {{ copy(content.summary) }}
      </p>

      <div class="hero__actions">
        @for (cta of content.ctas; track cta.id) {
          @if (cta.id === 'cv') {
            <app-ui-button
              [href]="languageService.cvPath()"
              [external]="true"
              [label]="copy(cta.label)"
              [variant]="cta.kind"
            />
          } @else {
            <app-ui-button
              [href]="ctaHref(cta)"
              [label]="copy(cta.label)"
              [variant]="cta.kind"
            />
          }
        }
      </div>
    </div>

    <aside class="hero__aside">
      <div appViewportTilt="card" class="hero__portrait-shell surface-card hero__portrait-media">
        <img
          ngSrc="/assets/profile.webp"
          [ngSrcset]="portraitSrcset"
          [sizes]="portraitSizes"
          width="448"
          height="448"
          loading="eager"
          fetchpriority="high"
          decoding="sync"
          alt="João Paulo Dias Ventura"
        />
      </div>
    </aside>
  </div>
</section>
