<section class="experience section-padding" aria-labelledby="experience-title">
  <div class="container-wide experience__layout">
    <app-content-section-heading
      class="experience__heading"
      [eyebrow]="copy(heading.eyebrow)"
      [summary]="copy(heading.summary)"
      [summaryDelayMs]="100"
      [title]="copy(heading.title)"
      [titleId]="'experience-title'"
    />

    <div class="timeline">
      <div class="timeline__items">
        @for (experience of experiences; track experience.id; let index = $index) {
          <article appRevealOnScroll [delayMs]="index * 110 + 120" [preset]="'card'" class="timeline__item">
            <app-experience-card
              appViewportTilt="card"
              class="timeline__card surface-card"
              [company]="experience.company"
              [highlights]="experienceHighlights(experience.highlights)"
              [period]="copy(experience.period)"
              [role]="copy(experience.role)"
              [summary]="copy(experience.summary)"
            />
          </article>
        }
      </div>
    </div>
  </div>
</section>
