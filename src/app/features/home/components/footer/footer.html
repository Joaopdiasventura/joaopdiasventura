<footer class="footer">
  <div class="container-wide footer__inner">
    <div class="footer__copy">
      <p>© {{ currentYear }} João Paulo Dias Ventura. {{ copy(chrome.footerRights) }}</p>
    </div>

    <div class="footer__links">
      @for (link of socialLinks; track link.href) {
        <a
          class="action-link action-link--surface"
          [href]="link.href"
          [attr.aria-label]="copy(link.label)"
          [attr.target]="link.external ? '_blank' : null"
          [attr.rel]="link.external ? 'noopener noreferrer' : null"
        >
          <img
            [ngSrc]="iconPath(link)"
            width="18"
            height="18"
            class="icon-img icon-img--muted"
            alt=""
            aria-hidden="true"
          />
        </a>
      }
    </div>
  </div>
</footer>
