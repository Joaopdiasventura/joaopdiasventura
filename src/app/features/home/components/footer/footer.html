<footer class="footer">
  <div class="container-wide footer__inner">
    <div class="footer__copy">
      <p>© {{ currentYear }} João Paulo Dias Ventura. {{ copy(chrome.footerRights) }}</p>
    </div>

    <div class="footer__links">
      @for (link of socialLinks; track link.href) {
        <app-ui-icon-link
          class="footer__link"
          [href]="link.href"
          [ariaLabel]="copy(link.label)"
          [external]="!!link.external"
          [iconSrc]="iconPath(link)"
        />
      }
    </div>
  </div>
</footer>
