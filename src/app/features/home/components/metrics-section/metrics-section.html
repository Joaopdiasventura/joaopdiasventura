<section class="impact-strip section-padding" [attr.aria-label]="copy(ariaLabel)">
  <div class="container-wide">
    <div class="impact-strip__grid">
      @for (metric of metrics; track metric.id; let index = $index) {
        <div appRevealOnScroll [delayMs]="index * 80" [preset]="'panel'" class="impact-strip__item-wrap">
          <app-impact-metric-card
            appViewportTilt="card"
            class="impact-strip__item surface-card"
            [label]="copy(metric.label)"
            [value]="metric.value"
          />
        </div>
      }
    </div>
  </div>
</section>
