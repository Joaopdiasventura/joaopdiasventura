<section class="contact section-padding" aria-labelledby="contact-title">
  <div class="container-wide contact__layout">
    <div class="contact__intro">
      <app-content-section-heading
        class="contact__heading"
        [eyebrow]="copy(content.heading.eyebrow)"
        [summary]="copy(content.heading.summary)"
        [summaryDelayMs]="120"
        [title]="copy(content.heading.title)"
        [titleId]="'contact-title'"
      />

      <div appRevealOnScroll [delayMs]="200" [preset]="'panel'" class="contact__panel-wrap">
        <article appViewportTilt="card" class="contact__details surface-card">
          <app-content-meta-list class="contact__details-grid" [items]="detailItems()" />
        </article>
      </div>
    </div>

    <div appRevealOnScroll [delayMs]="120" [preset]="'panel'" class="contact-form-wrap">
      <form appViewportTilt="card" class="contact-form surface-card" novalidate (submit)="submit($event)">
        <div class="contact-form__chrome" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
        </div>

        <div class="contact-form__grid">
          <app-ui-text-field
            class="field"
            [autocomplete]="'name'"
            [id]="'contact-name'"
            [invalid]="controlInvalid('name')"
            [label]="copy(content.formName)"
            [required]="true"
            [type]="'text'"
            [value]="formValue().name"
            (blurred)="markTouched('name')"
            (valueChange)="updateFieldValue('name', $event)"
          />

          <app-ui-text-field
            class="field"
            [autocomplete]="'email'"
            [id]="'contact-email'"
            [invalid]="controlInvalid('email')"
            [label]="copy(content.formEmail)"
            [required]="true"
            [type]="'email'"
            [value]="formValue().email"
            (blurred)="markTouched('email')"
            (valueChange)="updateFieldValue('email', $event)"
          />
        </div>

        <app-ui-textarea-field
          class="field"
          [id]="'contact-message'"
          [invalid]="controlInvalid('message')"
          [label]="copy(content.formMessage)"
          [required]="true"
          [rows]="6"
          [value]="formValue().message"
          (blurred)="markTouched('message')"
          (valueChange)="updateFieldValue('message', $event)"
        />

        <div class="contact-form__actions">
          <app-ui-button
            class="contact-form__submit"
            [disabled]="isSubmitting()"
            [label]="isSubmitting() ? copy(content.formSending) : copy(content.formSubmit)"
            [type]="'submit'"
            [variant]="'primary'"
          />

          <p
            class="contact-form__status"
            [class.contact-form__status--error]="submitStatus() === 'error'"
            aria-live="polite"
          >
            @if (submitStatus() === 'success') {
              {{ copy(content.formSent) }}
            } @else if (submitStatus() === 'error') {
              {{ copy(content.formError) }}
            }
          </p>
        </div>
      </form>
    </div>
  </div>
</section>
