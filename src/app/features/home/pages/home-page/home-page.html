<div class="page-shell page-shell--home home-shell" data-scene-section>
  <div class="page-shell__background" aria-hidden="true"></div>
  @defer (on timer(5000ms)) {
    <app-brand-scene class="page-shell__scene page-shell__scene--home" />
  } @placeholder {
    <app-loading-bg class="page-shell__scene page-shell__scene--home" />
  }

  <div class="page-shell__content">
    <app-navbar />

    <span id="top" class="scroll-anchor" tabindex="-1"></span>

    <main class="home-main">
      <div class="home-scene-stage">
        <app-hero-section />

        <span #metricsTrigger class="scroll-anchor" aria-hidden="true"></span>
        @defer (on viewport(metricsTrigger)) {
          <app-metrics-section />
        }
      </div>

      <span #aboutTrigger id="about" class="scroll-anchor" tabindex="-1"></span>
      @defer (on viewport(aboutTrigger)) {
        <app-about-section />
      }

      <span #projectsTrigger id="projects" class="scroll-anchor" tabindex="-1"></span>
      @defer (on viewport(projectsTrigger)) {
        <app-projects-section />
      }

      <span #experienceTrigger id="experience" class="scroll-anchor" tabindex="-1"></span>
      @defer (on viewport(experienceTrigger)) {
        <app-experience-section />
      }

      <span #contactTrigger id="contact" class="scroll-anchor" tabindex="-1"></span>
      @defer (on viewport(contactTrigger)) {
        <app-contact-section />
      }
    </main>

    <span #footerTrigger class="scroll-anchor" aria-hidden="true"></span>
    @defer (on viewport(footerTrigger)) {
      <app-footer />
    }
  </div>
</div>
